###############################################################
#  ZEEK + RITA v5  |  Network Threat Detection Stack
#  Supports: PCAP analysis + Live interface monitoring
#  Outputs:  CSV reports + Web dashboard + Terminal
###############################################################

networks:
  rita-network: {}

volumes:
  clickhouse_data:

services:

  # ─────────────────────────────────────────────────────────
  # ZEEK — Converts PCAPs or live traffic into TSV logs
  # ─────────────────────────────────────────────────────────
  zeek:
    image: ghcr.io/activecm/docker-zeek:latest
    container_name: zeek
    restart: "no"
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./pcaps:/pcaps:ro
      - ./zeek-logs:/zeek-logs

  # ─────────────────────────────────────────────────────────
  # CLICKHOUSE — RITA v5 database backend
  # ─────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    restart: unless-stopped
    networks:
      - rita-network
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      start_period: 10s
      retries: 20
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - /etc/localtime:/etc/localtime:ro
    ulimits:
      nproc: 65535
      nofile:
        soft: 131070
        hard: 131070

  # ─────────────────────────────────────────────────────────
  # RITA — Beacon / C2 / DNS tunnel detection engine
  # ─────────────────────────────────────────────────────────
  rita:
    image: ghcr.io/activecm/rita:v5.1.1
    container_name: rita
    restart: "no"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - rita-network
    volumes:
      - ./zeek-logs:/zeek-logs:ro
      - ./results:/results
      - ./rita-config/config.hjson:/config.hjson:ro
    environment:
      - DB_ADDRESS=clickhouse:9000
      - TERM=xterm-256color

  # ─────────────────────────────────────────────────────────
  # RITA WEB — Dashboard at http://localhost:8080
  # ─────────────────────────────────────────────────────────
  rita-web:
    image: ghcr.io/activecm/rita:v5.1.1
    container_name: rita-web
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - rita-network
    ports:
      - "8080:8080"
    environment:
      - DB_ADDRESS=clickhouse:9000
      - TERM=xterm-256color
    command: ["server"]
